<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e87443"/>
      <stop offset="1" stop-color="#ce5a2f"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="88" fill="#f3efe7"/>

  <g filter="url(#shadow)">
    <rect x="116" y="104" width="80" height="60" rx="4" fill="url(#tile)"/>
    <rect x="204" y="104" width="100" height="60" rx="4" fill="url(#tile)"/>
    <rect x="312" y="104" width="80" height="60" rx="4" fill="url(#tile)"/>

    <rect x="116" y="172" width="80" height="60" rx="4" fill="url(#tile)"/>

    <rect x="116" y="240" width="80" height="60" rx="4" fill="url(#tile)"/>
    <rect x="204" y="240" width="52" height="60" rx="4" fill="url(#tile)"/>
    <rect x="264" y="240" width="80" height="60" rx="4" fill="url(#tile)"/>

    <rect x="116" y="308" width="80" height="60" rx="4" fill="url(#tile)"/>

    <rect x="116" y="376" width="80" height="60" rx="4" fill="url(#tile)"/>
    <rect x="204" y="376" width="100" height="60" rx="4" fill="url(#tile)"/>
    <rect x="312" y="376" width="80" height="60" rx="4" fill="url(#tile)"/>
  </g>
</svg>
