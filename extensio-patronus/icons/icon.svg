<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="48%" stop-color="#2f2f2f"/>
      <stop offset="100%" stop-color="#242424"/>
    </linearGradient>

    <linearGradient id="symbol" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#f1f1f1"/>
      <stop offset="46%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
    </linearGradient>

    <filter id="outerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="symbolShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="150" fill="url(#bg)" filter="url(#outerShadow)"/>

  <g filter="url(#symbolShadow)">
    <path
      d="M373 336 A236 236 0 1 0 651 336"
      fill="none"
      stroke="url(#symbol)"
      stroke-width="74"
      stroke-linecap="round"/>
    <rect x="476" y="224" width="72" height="308" rx="36" fill="url(#symbol)"/>
  </g>
</svg>
