<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome extensions</title>
    <style>
      :root {
        --bg: #0d0d0d;
        --panel: #171717;
        --ink: #e8e8e8;
        --muted: #9a9a9a;
        --line: #2f2f2f;
        --accent: #6b8fa3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px 16px;
        background:
          radial-gradient(circle at top left, rgba(107, 143, 163, 0.16), transparent 24%),
          linear-gradient(180deg, #0d0d0d 0%, #111111 100%);
        color: var(--ink);
        font-family: "JetBrains Mono", "IBM Plex Sans", "Consolas", sans-serif;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(23, 23, 23, 0.92);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.05;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.65;
      }

      ul {
        margin: 0;
        padding-left: 20px;
      }

      li {
        margin: 8px 0;
      }

      a {
        color: #d8e4eb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chrome extensions</h1>
      <p>
        Public pages for extensions in this repository.
      </p>
      <ul>
        <li>
          <a id="extensioPatronusPrivacyLink" href="../extensio-patronus/docs/privacy/">Extensio Patronus privacy policy</a>
        </li>
      </ul>
    </main>
    <script>
      const privacyLink = document.getElementById("extensioPatronusPrivacyLink");
      const isGitHubPages = window.location.hostname.endsWith("github.io");

      if (privacyLink && isGitHubPages) {
        privacyLink.href = "./extensio-patronus/privacy/";
      }
    </script>
  </body>
</html>
